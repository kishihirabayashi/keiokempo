<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Finger gradient: bright gold top → dark shadow bottom -->
  <linearGradient id="gf" gradientUnits="userSpaceOnUse" x1="0" y1="88" x2="0" y2="202">
    <stop offset="0%"   stop-color="#F4D448"/>
    <stop offset="28%"  stop-color="#D4AF37"/>
    <stop offset="100%" stop-color="#6A4A08"/>
  </linearGradient>

  <!-- Palm gradient: dark top (finger shadow) → bright mid → dark bottom -->
  <linearGradient id="gp" gradientUnits="userSpaceOnUse" x1="0" y1="190" x2="0" y2="282">
    <stop offset="0%"   stop-color="#8A6C10"/>
    <stop offset="42%"  stop-color="#D4AF37"/>
    <stop offset="100%" stop-color="#4E3606"/>
  </linearGradient>

  <!-- Thumb gradient -->
  <linearGradient id="gth" gradientUnits="userSpaceOnUse" x1="0" y1="250" x2="0" y2="284">
    <stop offset="0%"   stop-color="#C4A028"/>
    <stop offset="100%" stop-color="#6A4A08"/>
  </linearGradient>

  <!-- Drop shadow for the whole fist -->
  <filter id="shadow" x="-15%" y="-10%" width="135%" height="130%">
    <feDropShadow dx="4" dy="6" stdDeviation="5"
                  flood-color="#000820" flood-opacity="0.85"/>
  </filter>

</defs>

<!-- Black background -->
<rect width="400" height="400" fill="#000000"/>

<!-- White shield outline -->
<path d="M44 10 L356 10 L356 240 Q356 325 200 395 Q44 325 44 240 Z" fill="white"/>

<clipPath id="sh">
  <path d="M60 26 L340 26 L340 238 Q340 318 200 385 Q60 318 60 238 Z"/>
</clipPath>

<!-- Navy body -->
<path d="M60 26 L340 26 L340 238 Q340 318 200 385 Q60 318 60 238 Z" fill="#002060"/>

<!-- Red stripe -->
<rect x="169" y="0" width="62" height="420" fill="#C8102E" clip-path="url(#sh)"/>

<!-- ═══ FIST (with drop shadow + 3D shading) ═══ -->
<g clip-path="url(#sh)" filter="url(#shadow)">

  <!-- Palm body -->
  <rect x="97" y="190" width="208" height="92" rx="18" fill="url(#gp)"/>

  <!-- 4 Fingers (equal width, boxy comic style) -->
  <rect x="101" y="88"  width="44" height="114" rx="19" fill="url(#gf)"/>
  <rect x="155" y="88"  width="44" height="114" rx="19" fill="url(#gf)"/>
  <rect x="209" y="88"  width="44" height="114" rx="19" fill="url(#gf)"/>
  <rect x="263" y="88"  width="44" height="114" rx="19" fill="url(#gf)"/>

  <!-- Thumb (lower right) -->
  <rect x="272" y="250" width="50" height="34" rx="14" fill="url(#gth)"/>

</g>

<!-- ═══ NAVY CUTS + DETAIL (no drop-shadow on these) ═══ -->
<g clip-path="url(#sh)">

  <!-- Deep U-cuts between fingers -->
  <path d="M145 82 L145 204 Q150 224 155 204 L155 82 Z" fill="#001030"/>
  <path d="M199 82 L199 204 Q204 224 209 204 L209 82 Z" fill="#001030"/>
  <path d="M253 82 L253 204 Q258 224 263 204 L263 82 Z" fill="#001030"/>

  <!-- Knuckle highlight spots (bright gold, top of each bump) -->
  <ellipse cx="123" cy="101" rx="15" ry="9" fill="#F8E45A" opacity="0.62"/>
  <ellipse cx="177" cy="101" rx="15" ry="9" fill="#F8E45A" opacity="0.62"/>
  <ellipse cx="231" cy="101" rx="15" ry="9" fill="#F8E45A" opacity="0.62"/>
  <ellipse cx="285" cy="101" rx="15" ry="9" fill="#F8E45A" opacity="0.62"/>

  <!-- Right-edge shadow strip on each finger (adds thickness/depth) -->
  <rect x="139" y="93" width="6"  height="109" rx="3" fill="#3A2400" opacity="0.45"/>
  <rect x="193" y="93" width="6"  height="109" rx="3" fill="#3A2400" opacity="0.45"/>
  <rect x="247" y="93" width="6"  height="109" rx="3" fill="#3A2400" opacity="0.45"/>
  <rect x="301" y="93" width="6"  height="109" rx="3" fill="#3A2400" opacity="0.45"/>

  <!-- Knuckle arch creases at finger–palm joint -->
  <path d="M107 195 Q123 213 141 195"
        fill="none" stroke="#3A2800" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M161 195 Q177 213 195 195"
        fill="none" stroke="#3A2800" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M215 195 Q231 213 249 195"
        fill="none" stroke="#3A2800" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M269 195 Q285 213 303 195"
        fill="none" stroke="#3A2800" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Palm highlight edge (top of palm, just under fingers) -->
  <path d="M100 193 Q200 182 305 193"
        fill="none" stroke="#E8C840" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

</g>

</svg>
